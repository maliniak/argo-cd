apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-b
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: backend-b
    app.kubernetes.io/part-of: gitops-lab
spec:
  replicas: {{ .Values.backendB.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: backend-b
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-b
        app.kubernetes.io/part-of: gitops-lab
    spec:
      containers:
        - name: backend-b
          image: {{ printf "%s:%s" .Values.backendB.image.repository .Values.backendB.image.tag | quote }}
          imagePullPolicy: {{ .Values.backendB.image.pullPolicy }}
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
{{ toYaml .Values.backendB.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend-b
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: backend-b
    app.kubernetes.io/part-of: gitops-lab
spec:
  selector:
    app.kubernetes.io/name: backend-b
  ports:
    - name: http
      port: {{ .Values.backendB.service.port }}
      targetPort: 8000