apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-products
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: backend-products
    app.kubernetes.io/part-of: gitops-lab
spec:
  replicas: {{ .Values.backendProducts.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: backend-products
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-products
        app.kubernetes.io/part-of: gitops-lab
    spec:
      containers:
        - name: backend-products
          image: {{ printf "%s:%s" .Values.backendProducts.image.repository .Values.backendProducts.image.tag | quote }}
          imagePullPolicy: {{ .Values.backendProducts.image.pullPolicy }}
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
{{ toYaml .Values.backendProducts.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend-products
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: backend-products
    app.kubernetes.io/part-of: gitops-lab
spec:
  selector:
    app.kubernetes.io/name: backend-products
  ports:
    - name: http
      port: {{ .Values.backendProducts.service.port }}
      targetPort: 8000