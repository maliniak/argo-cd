apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-orders
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: backend-orders
    app.kubernetes.io/part-of: gitops-lab
spec:
  replicas: {{ .Values.backendOrders.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: backend-orders
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-orders
        app.kubernetes.io/part-of: gitops-lab
    spec:
      containers:
        - name: backend-orders
          image: {{ printf "%s:%s" .Values.backendOrders.image.repository .Values.backendOrders.image.tag | quote }}
          imagePullPolicy: {{ .Values.backendOrders.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: BACKEND_PRODUCTS_URL
              value: {{ printf "http://backend-products.%s.svc.cluster.local:8000" .Release.Namespace | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
{{ toYaml .Values.backendOrders.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: backend-orders
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: backend-orders
    app.kubernetes.io/part-of: gitops-lab
spec:
  selector:
    app.kubernetes.io/name: backend-orders
  ports:
    - name: http
      port: {{ .Values.backendOrders.service.port }}
      targetPort: 8000