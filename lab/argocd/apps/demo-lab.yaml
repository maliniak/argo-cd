apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-lab
  namespace: argocd
spec:
  project: demo-project
  source:
    repoURL: https://github.com/maliniak/argo-cd.git
    targetRevision: main
    path: lab/k8s/base
    helm:
      releaseName: demo-lab
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true