apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-root
  namespace: argocd
spec:
  project: demo-project
  source:
    repoURL: https://github.com/maliniak/eks-fargate.git
    targetRevision: main
    path: lab/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true