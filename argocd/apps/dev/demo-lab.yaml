apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-lab-dev
  namespace: argocd
spec:
  project: demo-project
  source:
    repoURL: https://github.com/maliniak/lab.git
    targetRevision: dev
    path: k8s/base
    helm:
      releaseName: demo-lab-dev
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
